events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Reverse proxy for backend API - supports internal backend ingress
        # Backend app name should be set via VITE_BACKEND_URL env var
        # This variable is substituted at container startup by env-config.sh
        location /api/ {
            # Disable buffering for Server-Sent Events (SSE) support
            proxy_buffering off;
            proxy_cache off;
            
            # BACKEND_URL is injected at runtime via envsubst in env-config.sh
            # In Container Apps environment with internal ingress:
            #   - Use http://<BACKEND_APP_NAME> for apps in same environment
            #   - Traffic stays within the environment (never leaves)
            # For external backend:
            #   - Use full FQDN like https://backend.region.azurecontainerapps.io
            # The ${BACKEND_URL} will be replaced at runtime
            
            # Remove /api prefix before proxying (adjust if backend expects /api)
            rewrite ^/api/(.*)$ /$1 break;
            
            proxy_pass ${BACKEND_URL};
            
            # Essential headers for proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # SSE/EventSource specific settings
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            
            # Timeout settings for long-running SSE connections
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Enable caching for static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Handle client-side routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Disable access to dotfiles
        location ~ /\. {
            deny all;
        }
    }
}
